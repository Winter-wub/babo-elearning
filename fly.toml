# =============================================================================
# fly.toml — fly.io deployment configuration for the e-learning platform
#
# App:     e-learning-platform
# Runtime: Node 20 Alpine (multi-stage Docker build)
# Region:  sin (Singapore) — change to the region closest to your users
#
# Before first deploy:
#   1. flyctl apps create e-learning-platform
#   2. flyctl secrets set DATABASE_URL=... AUTH_SECRET=... AUTH_URL=...
#   3. flyctl deploy
#
# Database: External Neon Postgres (serverless).
# Set DATABASE_URL as a fly secret pointing to the Neon connection string.
# =============================================================================

app      = "e-learning-platform"
primary_region = "sin"

# Build from the project's existing multi-stage Dockerfile.
# NEXT_PUBLIC_APP_URL build arg is required for email verification links.
[build]
  dockerfile = "Dockerfile"

  [build.args]
    NEXT_PUBLIC_APP_URL = "https://englishwithgift.com"

# --------------------------------------------------------------------------
# HTTP service
# --------------------------------------------------------------------------
[[services]]
  # Internal port that the Next.js standalone server listens on
  internal_port = 3000
  protocol      = "tcp"
  auto_stop_machines  = true   # Stop idle machines to reduce cost
  auto_start_machines = true   # Wake on incoming request automatically
  # Keep at least one machine running during deployments for zero downtime.
  # Set to 0 if you want fully serverless behaviour (cold-start on every request).
  min_machines_running = 1

  [[services.ports]]
    # Redirect plain HTTP to HTTPS
    port     = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    # TLS-terminated HTTPS — fly handles the TLS cert automatically
    port     = 443
    handlers = ["tls", "http"]

  # --------------------------------------------------------------------------
  # Health check — hits /api/health before routing traffic to the machine
  # --------------------------------------------------------------------------
  [[services.http_checks]]
    interval       = 30000  # ms between checks
    timeout        = 10000  # ms before the check is declared failed
    grace_period   = "30s"  # time to wait after machine starts before checking
    method         = "GET"
    path           = "/api/health"
    protocol       = "http"
    tls_skip_verify = false

# --------------------------------------------------------------------------
# VM sizing — shared-cpu-1x is the cheapest option; upgrade for production
# --------------------------------------------------------------------------
[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"   # Increase to 1gb if Next.js build-time or SSR is OOM

# --------------------------------------------------------------------------
# Deployment strategy
# --------------------------------------------------------------------------
[deploy]
  # rolling: replace machines one at a time (zero-downtime)
  # Use "immediate" only if you have min_machines_running = 0
  strategy = "rolling"

  # Automatically apply Prisma migrations before each deployment
  release_command = "node /prisma-cli/node_modules/prisma/build/index.js migrate deploy --schema /app/prisma/schema.prisma"
