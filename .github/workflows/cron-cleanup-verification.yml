name: Cleanup Verification Attempts

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup endpoint
        run: |
          curl -s -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://e-learning-platform.fly.dev/api/cron/cleanup-verification-attempts
