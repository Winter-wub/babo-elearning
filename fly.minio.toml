# =============================================================================
# fly.minio.toml — MinIO S3-compatible storage on Fly.io
#
# Deploy:
#   1. flyctl apps create e-learning-platform-minio
#   2. flyctl volumes create minio_data --size 10 --region sin --app e-learning-platform-minio
#   3. flyctl secrets set MINIO_ROOT_USER=<user> MINIO_ROOT_PASSWORD=<password> --app e-learning-platform-minio
#   4. flyctl deploy --config fly.minio.toml --app e-learning-platform-minio
#
# The main app reaches MinIO via Fly private networking:
#   R2_ENDPOINT=http://e-learning-platform-minio.internal:9000
# =============================================================================

app = "e-learning-platform-minio"
primary_region = "sin"

[build]
  image = "minio/minio:latest"

[env]
  # MinIO config
  MINIO_VOLUMES = "/data"

[processes]
  app = "server /data --address :9000 --console-address :9001"

# Persistent volume for object data
[mounts]
  source      = "minio_data"
  destination = "/data"

# S3 API — exposed on Fly private network (*.internal)
[[services]]
  internal_port = 9000
  protocol      = "tcp"
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port     = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval     = 30000
    timeout      = 5000
    grace_period = "15s"
    method       = "GET"
    path         = "/minio/health/live"
    protocol     = "http"

# MinIO console — optional, remove if you don't need web UI
[[services]]
  internal_port = 9001
  protocol      = "tcp"

  [[services.ports]]
    port     = 9001
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval     = 30000
    timeout      = 5000
    grace_period = "15s"
    method       = "GET"
    path         = "/minio/health/live"
    protocol     = "http"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"
